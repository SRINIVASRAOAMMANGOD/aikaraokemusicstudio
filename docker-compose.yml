version: '3.8'

# ============================================================
# Production-Ready Docker Compose Configuration
# AI Karaoke Music Studio
# ============================================================
# Usage:
#   docker-compose up -d                 # Start services
#   docker-compose logs -f web           # View logs
#   docker-compose ps                    # Check status
#   docker-compose down                  # Stop services
#   docker-compose exec web curl http://localhost:5000/health  # Health check
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: aikaraoke-studio
    
    # Image naming for consistency
    image: aikaraoke:latest
    
    # Restart policy for production
    restart: always
    
    # Port mapping
    ports:
      - "5000:5000"
    
    # Environment configuration
    environment:
      # Production settings (required)
      FLASK_ENV: production
      FLASK_APP: app.py
      SECRET_KEY: ${SECRET_KEY:?ERROR - SECRET_KEY not set. Run: export SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')}
      
      # Audio processing
      DEMUCS_MODEL: ${DEMUCS_MODEL:-htdemucs}
      TORCH_NUM_THREADS: ${TORCH_NUM_THREADS:-4}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    
    # Volume mounts for persistent data
    volumes:
      # Uploads directory
      - ./uploads:/app/uploads
      
      # Projects directory (large - consider external storage)
      - ./projects:/app/projects
      
      # Optional: logs directory
      - ./logs:/app/logs
    
    # Health check for orchestration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource limits
    deploy:
      resources:
        limits:
          # Maximum CPU (in cores)
          cpus: '2'
          # Maximum memory
          memory: 4G
        reservations:
          # Guaranteed CPU
          cpus: '1'
          # Guaranteed memory
          memory: 2G
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "aikaraoke=production"
    
    # Labels for monitoring/orchestration
    labels:
      - "app=aikaraoke"
      - "version=1.0"
      - "environment=production"
    
    # Network configuration
    networks:
      - aikaraoke-network


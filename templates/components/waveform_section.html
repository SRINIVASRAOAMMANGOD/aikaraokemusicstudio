<section class="waveform-section" id="waveform-section" style="display: none;">
    <div class="waveform-container">
        <div class="waveform-header">
            <h3><i class="fas fa-wave-square"></i> Waveform Visualization</h3>
            <div class="waveform-controls">
                <button class="btn-icon" id="zoom-in" title="Zoom In">
                    <i class="fas fa-search-plus"></i>
                </button>
                <button class="btn-icon" id="zoom-out" title="Zoom Out">
                    <i class="fas fa-search-minus"></i>
                </button>
                <button class="btn-icon" id="fit-view" title="Fit to View">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
        
        <div class="waveform-display">
            <!-- Main waveform -->
            <div id="waveform-main" class="waveform"></div>
            
            <!-- Timeline -->
            <div id="waveform-timeline" class="waveform-timeline"></div>
            
            <!-- Individual stem waveforms (collapsed by default) -->
            <div class="stem-waveforms" id="stem-waveforms">
                <div class="stem-wave" data-stem="vocals">
                    <label>Vocals</label>
                    <div id="waveform-vocals" class="waveform-mini"></div>
                </div>
                <div class="stem-wave" data-stem="drums">
                    <label>Drums</label>
                    <div id="waveform-drums" class="waveform-mini"></div>
                </div>
                <div class="stem-wave" data-stem="bass">
                    <label>Bass</label>
                    <div id="waveform-bass" class="waveform-mini"></div>
                </div>
                <div class="stem-wave" data-stem="other">
                    <label>Other</label>
                    <div id="waveform-other" class="waveform-mini"></div>
                </div>
            </div>
        </div>
        
        <div class="playback-time">
            <span id="current-time">0:00</span>
            <span class="time-separator">/</span>
            <span id="total-time">0:00</span>
        </div>
    </div>
</section>

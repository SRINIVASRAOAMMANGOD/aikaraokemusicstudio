<section class="stem-controls-section" id="stem-controls-section" style="display: none;">
    <div class="stem-controls-container">
        <h3><i class="fas fa-sliders-h"></i> Stem Controls</h3>
        
        <div class="stems-grid">
            <!-- Vocals -->
            <div class="stem-control" data-stem="vocals">
                <div class="stem-header">
                    <div class="stem-title">
                        <i class="fas fa-microphone"></i>
                        <span>Vocals</span>
                    </div>
                    <div class="stem-actions">
                        <button class="btn-icon solo-btn" title="Solo" data-action="solo">
                            <i class="fas fa-headphones"></i>
                        </button>
                        <button class="btn-icon mute-btn" title="Mute" data-action="mute">
                            <i class="fas fa-volume-mute"></i>
                        </button>
                        <button class="btn-icon download-btn" title="Download" data-action="download">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
                <div class="stem-controls">
                    <div class="control-group">
                        <label>Volume</label>
                        <input type="range" class="volume-slider" min="0" max="100" value="80" data-control="volume">
                        <span class="control-value">80%</span>
                    </div>
                    <div class="control-group">
                        <label>Pan</label>
                        <input type="range" class="pan-slider" min="-100" max="100" value="0" data-control="pan">
                        <span class="control-value">Center</span>
                    </div>
                </div>
            </div>
            
            <!-- Drums -->

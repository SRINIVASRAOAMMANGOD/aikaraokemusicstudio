<section class="score-dash" id="ai-score-section">
    <div class="score-dash__inner">

        <!-- Header row: title + always-visible action buttons -->
        <div class="score-dash__header">
            <h3 class="score-dash__title">
                <i class="fas fa-chart-bar"></i> Performance Analysis
            </h3>
            <div class="score-dash__actions">
                <button class="sda-btn sda-btn--primary" id="analyze-performance-btn">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analyze</span>
                </button>
                <button class="sda-btn sda-btn--secondary" id="share-score-btn" title="Share Score">
                    <i class="fas fa-share-alt"></i>
                    <span>Share</span>
                </button>
                <button class="sda-btn sda-btn--secondary" id="download-report-btn" title="Download Report">
                    <i class="fas fa-download"></i>
                    <span>Report</span>
                </button>
            </div>
        </div>

        <!-- Empty state (hidden after analysis) -->
        <div class="score-dash__empty" id="score-empty-state">
            <i class="fas fa-microphone-slash"></i>
            <p>Click <strong>Analyze</strong> to score your performance against the original vocal.</p>
        </div>

        <!-- Results (hidden until analysis runs) -->
        <div class="score-dash__results" id="score-results" style="display:none">

            <!-- Overall score circle -->
            <div class="score-overall">
                <div class="score-ring">
                    <svg viewBox="0 0 120 120" width="120" height="120">
                        <circle class="score-bg"   cx="60" cy="60" r="52"/>
                        <circle class="score-fill" cx="60" cy="60" r="52" id="score-circle"/>
                    </svg>
                    <div class="score-ring__text">
                        <span class="score-ring__val" id="overall-score">0</span>
                        <span class="score-ring__max">/100</span>
                    </div>
                </div>
                <div class="score-overall__info">
                    <p class="score-overall__label">Overall Performance</p>
                    <p class="score-overall__rating" id="score-rating">-</p>
                </div>
            </div>

            <!-- 6-metric grid -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-card__icon"><i class="fas fa-music"></i></div>
                    <div class="metric-card__body">
                        <div class="metric-card__top">
                            <span class="metric-card__name">Pitch Accuracy</span>
                            <span class="metric-card__val"><b id="pitch-score">0</b>/100</span>
                        </div>
                        <div class="metric-bar"><div class="metric-bar__fill" id="pitch-fill"></div></div>
                        <p class="metric-card__fb" id="pitch-feedback">-</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-card__icon"><i class="fas fa-clock"></i></div>
                    <div class="metric-card__body">
                        <div class="metric-card__top">
                            <span class="metric-card__name">Timing</span>
                            <span class="metric-card__val"><b id="timing-score">0</b>/100</span>
                        </div>
                        <div class="metric-bar"><div class="metric-bar__fill" id="timing-fill"></div></div>
                        <p class="metric-card__fb" id="timing-feedback">-</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-card__icon"><i class="fas fa-volume-up"></i></div>
                    <div class="metric-card__body">
                        <div class="metric-card__top">
                            <span class="metric-card__name">Tone Quality</span>
                            <span class="metric-card__val"><b id="tone-score">0</b>/100</span>
                        </div>
                        <div class="metric-bar"><div class="metric-bar__fill" id="tone-fill"></div></div>
                        <p class="metric-card__fb" id="tone-feedback">-</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-card__icon"><i class="fas fa-heart"></i></div>
                    <div class="metric-card__body">
                        <div class="metric-card__top">
                            <span class="metric-card__name">Expression</span>
                            <span class="metric-card__val"><b id="expression-score">0</b>/100</span>
                        </div>
                        <div class="metric-bar"><div class="metric-bar__fill" id="expression-fill"></div></div>
                        <p class="metric-card__fb" id="expression-feedback">-</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-card__icon"><i class="fas fa-chart-line"></i></div>
                    <div class="metric-card__body">
                        <div class="metric-card__top">
                            <span class="metric-card__name">Consistency</span>
                            <span class="metric-card__val"><b id="consistency-score">0</b>/100</span>
                        </div>
                        <div class="metric-bar"><div class="metric-bar__fill" id="consistency-fill"></div></div>
                        <p class="metric-card__fb" id="consistency-feedback">-</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-card__icon"><i class="fas fa-wind"></i></div>
                    <div class="metric-card__body">
                        <div class="metric-card__top">
                            <span class="metric-card__name">Breath Control</span>
                            <span class="metric-card__val"><b id="breath-score">0</b>/100</span>
                        </div>
                        <div class="metric-bar"><div class="metric-bar__fill" id="breath-fill"></div></div>
                        <p class="metric-card__fb" id="breath-feedback">-</p>
                    </div>
                </div>
            </div>

        </div><!-- /score-results -->
    </div>
</section>

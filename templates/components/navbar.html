<nav class="navbar">
    <div class="container nav-container">
        <div class="nav-logo">
            <a href="{{ url_for('index') }}" style="display: flex; align-items: center; gap: var(--spacing-sm); text-decoration: none; color: inherit;">
                <i class="fas fa-microphone-alt"></i>
                <span>AI STEM Karaoke Studio</span>
            </a>
        </div>
        
        <ul class="nav-menu" id="nav-menu">
            <li><a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                <i class="fas fa-home"></i> Home
            </a></li>
            <li><a href="{{ url_for('projects') }}" class="nav-link {% if request.endpoint == 'projects' %}active{% endif %}">
                <i class="fas fa-folder"></i> Projects
            </a></li>
            <li><a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">
                <i class="fas fa-cog"></i> Settings
            </a></li>
        </ul>
        
        <div class="nav-toggle" id="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>

<script>
(function() {
  const toggle = document.getElementById('nav-toggle');
  const menu   = document.getElementById('nav-menu');
  if (!toggle || !menu) return;

  // Hamburger toggle
  toggle.addEventListener('click', function(e) {
    e.stopPropagation();
    menu.classList.toggle('active');
    toggle.classList.toggle('active');
    toggle.setAttribute('aria-expanded', menu.classList.contains('active'));
  });

  // Close when a link is tapped
  menu.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      menu.classList.remove('active');
      toggle.classList.remove('active');
    });
  });

  // Close on outside tap
  document.addEventListener('click', function(e) {
    if (!menu.contains(e.target) && !toggle.contains(e.target)) {
      menu.classList.remove('active');
      toggle.classList.remove('active');
    }
  });

  // Close on Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      menu.classList.remove('active');
      toggle.classList.remove('active');
    }
  });
})();
</script>

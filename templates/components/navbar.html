<nav class="navbar" data-mobile-menu-init="true">
    <div class="container nav-container">
        <div class="nav-logo">
            <a href="{{ url_for('index') }}" style="display: flex; align-items: center; gap: var(--spacing-sm); text-decoration: none; color: inherit;">
                <i class="fas fa-microphone-alt"></i>
                <span>AI STEM Karaoke Studio</span>
            </a>
        </div>
        
        <ul class="nav-menu" id="nav-menu">
            <li><a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                <i class="fas fa-home"></i> Home
            </a></li>
            <li><a href="{{ url_for('projects') }}" class="nav-link {% if request.endpoint == 'projects' %}active{% endif %}">
                <i class="fas fa-folder"></i> Projects
            </a></li>
            <li><a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">
                <i class="fas fa-cog"></i> Settings
            </a></li>
        </ul>
        
        <div class="nav-toggle" id="nav-toggle" role="button" tabindex="0" aria-label="Toggle navigation menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>

<script>
// Mobile menu handler - run as soon as possible
(() => {
  function initMenu() {
    const toggle = document.getElementById('nav-toggle');
    const menu = document.getElementById('nav-menu');
    const body = document.body;
    
    if (!toggle || !menu) {
      setTimeout(initMenu, 100);
      return;
    }

    function closeMenu() {
      menu.classList.remove('active');
      toggle.classList.remove('active');
      body.classList.remove('nav-open');
      menu.style.transform = 'translateX(-100%)';
      toggle.setAttribute('aria-expanded', 'false');
    }

    function openMenu() {
      menu.classList.add('active');
      toggle.classList.add('active');
      body.classList.add('nav-open');
      menu.style.transform = 'translateX(0)';
      toggle.setAttribute('aria-expanded', 'true');
    }

    // Main toggle handler
    const handleToggleClick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      if (menu.classList.contains('active')) {
        closeMenu();
      } else {
        openMenu();
      }
    };

    toggle.addEventListener('click', handleToggleClick, false);

    // Keyboard support
    toggle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.stopPropagation();
        handleToggleClick(e);
      }
    }, false);

    // Close on link click
    menu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        closeMenu();
      }, false);
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && !toggle.contains(e.target)) {
        if (menu.classList.contains('active')) {
          closeMenu();
        }
      }
    }, false);

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && menu.classList.contains('active')) {
        closeMenu();
      }
    }, false);
  }

  // Initialize when ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMenu, { once: true });
  } else {
    initMenu();
  }
})();
</script>
